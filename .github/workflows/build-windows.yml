name: Build Windows Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup MSVC Environment
      uses: ilammy/msvc-dev-cmd@v1  

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Install Vulkan SDK
      uses: jurplel/install-vulkan-action@v1
      with:
        version: '1.3.268.0' 

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Configure CMake
      run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DBUD_ENABLE_PROFILING=OFF -DBUD_ENABLE_AFTERMATH=ON -DBUD_BUILD_SAMPLES=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release -- -j

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BudEngine-Windows-Release
        path: build/
